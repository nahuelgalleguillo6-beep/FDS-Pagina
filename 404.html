<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — Flor de Sauco</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/jpeg" href="images/Pagina/logo-1.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --navy:#1B3A5C; --navy-dark:#0D2137; --cream:#FAF6EC;
            --gold:#C9963F; --gold-light:#DDB264;
            --font-serif:'Playfair Display',Georgia,serif;
            --font-sans:'DM Sans','Helvetica Neue',Arial,sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:var(--font-sans);
            background:linear-gradient(160deg,var(--navy) 0%,var(--navy-dark) 100%);
            color:var(--cream);min-height:100vh;
            display:flex;align-items:center;justify-content:center;
            text-align:center;padding:24px;
        }
        .wrap{max-width:540px}
        .code{
            font-family:var(--font-serif);font-weight:800;
            font-size:clamp(5rem,20vw,9rem);line-height:1;
            color:var(--gold-light);letter-spacing:.02em;
        }
        h1{
            font-family:var(--font-serif);font-weight:700;
            font-size:clamp(1.5rem,5vw,2.2rem);
            margin:8px 0 16px;color:var(--cream);
        }
        p{
            font-size:1.05rem;line-height:1.6;color:#D8E0E8;
            margin-bottom:32px;
        }
        .actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
        .btn{
            display:inline-block;padding:13px 28px;border-radius:8px;
            font-weight:600;font-size:1rem;text-decoration:none;
            transition:.25s ease;
        }
        .btn--primary{background:var(--gold);color:var(--navy-dark)}
        .btn--primary:hover{background:var(--gold-light);transform:translateY(-2px)}
        .btn--ghost{border:1.5px solid rgba(250,246,236,.4);color:var(--cream)}
        .btn--ghost:hover{border-color:var(--gold-light);color:var(--gold-light)}
        .brand{
            margin-top:44px;font-size:.8rem;letter-spacing:.18em;
            text-transform:uppercase;color:rgba(250,246,236,.5);
        }
        .flower{font-size:2rem;margin-bottom:8px}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="flower">🌼</div>
        <div class="code">404</div>
        <h1>Esta página se fue del horno</h1>
        <p>No encontramos lo que buscabas, pero el pan sigue recién hecho. Volvé al inicio y date una vuelta por nuestro menú.</p>
        <div class="actions">
            <a href="/" class="btn btn--primary">Volver al inicio</a>
            <a href="/#menu" class="btn btn--ghost">Ver el menú</a>
        </div>
        <div class="brand">Flor de Sauco · Tafí del Valle</div>
    </div>
</body>
</html>
